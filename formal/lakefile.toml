name = "TorusD4"
version = "0.1.0"
keywords = ["math"]
defaultTargets = ["TorusD4", "TorusD3Odd"]

[leanOptions]
pp.unicode.fun = true # pretty-prints `fun a ↦ b`
relaxedAutoImplicit = false
weak.linter.mathlibStandardSet = true
maxSynthPendingDepth = 3

[[require]]
name = "mathlib"
scope = "leanprover-community"
rev = "v4.28.0"

[[lean_lib]]
name = "TorusD4"

[[lean_lib]]
name = "TorusD3Odd"

[[lean_lib]]
name = "TorusD3Even"

[[lean_lib]]
name = "TorusD5"
